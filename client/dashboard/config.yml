backend:
  name: github
  repo: afnanadammv-cpu/qbee-NEW
  branch: main

media_folder: "client/public/assets"
public_folder: "/assets"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "client/index.html"
        label: "Home Page"
        name: "home"
        fields:
          - { label: "Hero Title", name: "title", widget: "string" }
          - { label: "Hero Background Image", name: "hero_image", widget: "image" }
